	<script>
	(() => {
		const stopNativeUi = (event) => {
			if (event.cancelable) event.preventDefault();
		};

		// Block browser UI that can appear over a touch game: text selection,
		// the iOS long-press callout/loupe, image dragging and zoom gestures.
		for (const type of ["contextmenu", "selectstart", "dragstart", "gesturestart", "gesturechange", "gestureend", "dblclick"]) {
			document.addEventListener(type, stopNativeUi, { capture: true, passive: false });
		}

		const lockDraggableMedia = (scope = document) => {
			for (const element of scope.querySelectorAll?.("img, canvas, svg") ?? []) {
				element.draggable = false;
				element.setAttribute("draggable", "false");
			}
		};

		document.addEventListener("DOMContentLoaded", () => {
			lockDraggableMedia();
			new MutationObserver((records) => {
				for (const record of records) {
					for (const node of record.addedNodes) {
						if (node.nodeType !== 1) continue;
						if (node.matches?.("img, canvas, svg")) {
							node.draggable = false;
							node.setAttribute("draggable", "false");
						}
						lockDraggableMedia(node);
					}
				}
			}).observe(document.documentElement, { childList: true, subtree: true });
		}, { once: true });
	})();
	</script>
